# ─── Build and publish Docker image to GHCR ───────────────────────────────────
#
# Triggers after the Tests workflow passes on main.
# Publishes the runeflow-export image to GitHub Container Registry (GHCR).
#
# Image: ghcr.io/OWNER/runeflow:latest
#        ghcr.io/OWNER/runeflow:sha-<short>

name: Publish

on:
  workflow_run:
    workflows: ["Tests"]
    branches: [main]
    types: [completed]

jobs:
  publish:
    name: Build and push to GHCR
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Check out the commit that triggered the Tests run, not HEAD.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/runeflow
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.export
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — speeds up rebuilds significantly.
          cache-from: type=gha
          cache-to: type=gha,mode=max
