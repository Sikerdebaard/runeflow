name: Tests

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/runeflow tests

      - name: Format check
        run: uv run ruff format --check src/runeflow tests

      - name: Type check
        run: uv run mypy src/runeflow

      - name: Run tests
        run: uv run pytest tests -v --cov=src/runeflow --cov-report=term-missing
