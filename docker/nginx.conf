# Runeflow Dashboard — nginx.conf
#
# Serves the pre-rendered static site generated by `runeflow build-site`.
# Mount this file to /etc/nginx/conf.d/default.conf inside the container.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;

    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"              always;
    add_header X-Frame-Options         "SAMEORIGIN"           always;
    add_header Referrer-Policy         "no-referrer"          always;
    add_header Content-Security-Policy
        "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'"
        always;

    # Static assets — cache aggressively
    location /assets/ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Data files — short cache so fresh exports are picked up quickly
    location ~* \.(json|csv)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # Chart images — 15-minute cache
    location ~* \.png$ {
        expires 15m;
        add_header Cache-Control "public";
    }

    # Clean URLs: try exact path, then index.html fallback, then 404
    location / {
        try_files $uri $uri/index.html =404;
    }

    # Gzip compression
    gzip            on;
    gzip_types      text/html text/css application/json text/csv image/svg+xml;
    gzip_min_length 256;
    gzip_vary       on;
}
