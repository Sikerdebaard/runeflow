repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key

  # ruff and mypy run via `uv run` so they always use the same versions as CI
  # (pinned in pyproject.toml / uv.lock).  No separate virtualenv is created.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        language: system
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        types: [python]

      - id: ruff-format
        name: ruff-format
        language: system
        entry: uv run ruff format
        types: [python]

      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy src/runeflow
        pass_filenames: false
        types: [python]

  - repo: local
    hooks:
      - id: license-headers
        name: SPDX license headers
        language: system
        entry: make license-headers
        pass_filenames: false
        types: [python]
